<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KSPF Lead Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      padding: 2rem;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #e5e5e5;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #000;
    }
    
    .stats {
      display: flex;
      gap: 2rem;
      font-size: 0.875rem;
      color: #666;
    }
    
    .stat-value { color: #000; font-weight: 600; }
    
    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    
    .filter-group {
      display: flex;
      gap: 0.5rem;
    }
    
    .filter-btn {
      padding: 0.5rem 1rem;
      border: 1px solid #ddd;
      background: transparent;
      color: #666;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.15s;
    }
    
    .filter-btn:hover { border-color: #999; color: #000; }
    .filter-btn.active { background: #000; color: #fff; border-color: #000; }
    
    .search-input {
      padding: 0.5rem 1rem;
      border: 1px solid #ddd;
      background: #fafafa;
      color: #000;
      border-radius: 6px;
      font-size: 0.875rem;
      width: 250px;
    }
    
    .search-input::placeholder { color: #999; }
    .search-input:focus { outline: none; border-color: #999; }
    
    .table-container {
      overflow-x: auto;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    
    th {
      text-align: left;
      padding: 0.75rem 1rem;
      background: #fafafa;
      color: #666;
      font-weight: 500;
      border-bottom: 1px solid #e5e5e5;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    
    th:hover { color: #000; }
    th.sorted { color: #000; }
    th.sorted::after { content: ' ↓'; }
    th.sorted.desc::after { content: ' ↑'; }
    
    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    
    tr:hover { background: #fafafa; }
    
    .lead-name {
      font-weight: 500;
      color: #000;
      display: block;
      margin-bottom: 0.25rem;
    }
    
    .lead-url {
      color: #888;
      font-size: 0.75rem;
      text-decoration: none;
    }
    
    .lead-url:hover { color: #666; }
    
    .score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-weight: 600;
      font-size: 0.75rem;
    }
    
    .score.high { background: #dcfce7; color: #16a34a; }
    .score.medium { background: #fef9c3; color: #ca8a04; }
    .score.low { background: #fee2e2; color: #dc2626; }
    
    .draft-badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      background: #dbeafe;
      color: #2563eb;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 500;
      margin-left: 0.5rem;
    }
    
    .status-select {
      padding: 0.375rem 0.75rem;
      border: 1px solid #ddd;
      background: #fff;
      color: #000;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    
    .status-select:focus { outline: none; border-color: #999; }
    
    .status-select.to-contact { border-color: #ccc; }
    .status-select.contacted { border-color: #3b82f6; background: #eff6ff; }
    .status-select.responded { border-color: #22c55e; background: #f0fdf4; }
    .status-select.client { border-color: #a855f7; background: #faf5ff; }
    .status-select.not-interested { border-color: #ef4444; background: #fef2f2; }
    
    .contact-info {
      font-size: 0.75rem;
      color: #666;
    }
    
    .contact-info a {
      color: #2563eb;
      text-decoration: none;
    }
    
    .contact-info a:hover { text-decoration: underline; }
    
    .issues {
      font-size: 0.75rem;
      color: #666;
      max-width: 200px;
    }
    
    .notes-input {
      width: 150px;
      padding: 0.375rem 0.5rem;
      border: 1px solid #ddd;
      background: #fff;
      color: #000;
      border-radius: 4px;
      font-size: 0.75rem;
    }
    
    .notes-input:focus { outline: none; border-color: #999; }
    
    .actions {
      display: flex;
      gap: 0.5rem;
    }
    
    .action-btn {
      padding: 0.375rem 0.5rem;
      border: none;
      background: #f0f0f0;
      color: #666;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    
    .action-btn:hover { background: #e5e5e5; color: #000; }
    
    .save-indicator {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.75rem 1.5rem;
      background: #22c55e;
      color: #fff;
      border-radius: 8px;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
    }
    
    .save-indicator.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #888;
    }
    
    .empty-state h2 { color: #666; margin-bottom: 1rem; }
    
    .load-btn {
      padding: 0.75rem 1.5rem;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
    }
    
    .load-btn:hover { background: #333; }
    
    #file-input { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 KSPF Lead Dashboard</h1>
    <div class="stats">
      <div><span class="stat-value" id="total-count">0</span> leads</div>
      <div><span class="stat-value" id="contacted-count">0</span> contacted</div>
      <div><span class="stat-value" id="responded-count">0</span> responded</div>
      <div><span class="stat-value" id="client-count">0</span> clients</div>
    </div>
  </div>
  
  <div class="filters">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="to-contact">To Contact</button>
      <button class="filter-btn" data-filter="contacted">Contacted</button>
      <button class="filter-btn" data-filter="responded">Responded</button>
      <button class="filter-btn" data-filter="client">Client</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn" data-filter="in-drafts">📧 In Drafts</button>
      <button class="filter-btn" data-filter="no-draft">No Draft</button>
    </div>
    <input type="text" class="search-input" placeholder="Search leads..." id="search-input">
    <input type="file" id="file-input" accept=".csv,.json">
    <button class="filter-btn" onclick="document.getElementById('file-input').click()">📂 Load CSV</button>
    <button class="filter-btn" onclick="exportData()">💾 Export</button>
  </div>
  
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th data-sort="name">Business</th>
          <th data-sort="leadScore">Score</th>
          <th data-sort="inDrafts">Draft</th>
          <th data-sort="status">Status</th>
          <th>Contact</th>
          <th>Issues</th>
          <th>Notes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="leads-table">
      </tbody>
    </table>
  </div>
  
  <div class="empty-state" id="empty-state" style="display: none;">
    <h2>No leads loaded</h2>
    <p>Load your pipeline-audited.csv to get started</p>
    <br>
    <button class="load-btn" onclick="document.getElementById('file-input').click()">Load CSV</button>
  </div>
  
  <div class="save-indicator" id="save-indicator">✓ Changes saved</div>

  <script>
    let leads = [];
    let currentFilter = 'all';
    let currentSort = { field: 'leadScore', desc: true };
    let searchQuery = '';
    
    // Try to load saved data on startup
    const saved = localStorage.getItem('kspf-leads');
    if (saved) {
      leads = JSON.parse(saved);
      render();
    } else {
      document.getElementById('empty-state').style.display = 'block';
      document.querySelector('.table-container').style.display = 'none';
    }
    
    // File input handler
    document.getElementById('file-input').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const text = await file.text();
      
      if (file.name.endsWith('.json')) {
        leads = JSON.parse(text);
      } else {
        // Parse CSV
        leads = parseCSV(text);
      }
      
      // Add status field if missing, check for email to determine draft status
      leads = leads.map(l => ({
        ...l,
        status: l.status || 'to-contact',
        notes: l.notes || '',
        leadScore: parseInt(l.leadScore) || 0,
        inDrafts: l.inDrafts !== undefined ? l.inDrafts : (l.email ? true : false) // assume email leads have drafts
      }));
      
      saveData();
      render();
      
      document.getElementById('empty-state').style.display = 'none';
      document.querySelector('.table-container').style.display = 'block';
    });
    
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseCSVLine(lines[0]);
      
      return lines.slice(1).map(line => {
        const values = parseCSVLine(line);
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = values[i] || '';
        });
        return obj;
      });
    }
    
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current.trim());
      return result;
    }
    
    // Filter buttons
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });
    
    // Search
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchQuery = e.target.value.toLowerCase();
      render();
    });
    
    // Sort headers
    document.querySelectorAll('th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const field = th.dataset.sort;
        if (currentSort.field === field) {
          currentSort.desc = !currentSort.desc;
        } else {
          currentSort = { field, desc: true };
        }
        render();
      });
    });
    
    function render() {
      // Update sort indicators
      document.querySelectorAll('th[data-sort]').forEach(th => {
        th.classList.remove('sorted', 'desc');
        if (th.dataset.sort === currentSort.field) {
          th.classList.add('sorted');
          if (currentSort.desc) th.classList.add('desc');
        }
      });
      
      // Filter and sort
      let filtered = leads.filter(l => {
        // Status filters
        if (['to-contact', 'contacted', 'responded', 'client', 'not-interested'].includes(currentFilter)) {
          if (l.status !== currentFilter) return false;
        }
        // Draft filters
        if (currentFilter === 'in-drafts' && !l.inDrafts) return false;
        if (currentFilter === 'no-draft' && l.inDrafts) return false;
        // Search
        if (searchQuery && !l.name?.toLowerCase().includes(searchQuery) && 
            !l.category?.toLowerCase().includes(searchQuery)) return false;
        return true;
      });
      
      filtered.sort((a, b) => {
        let aVal = a[currentSort.field];
        let bVal = b[currentSort.field];
        
        // Handle boolean for inDrafts
        if (currentSort.field === 'inDrafts') {
          aVal = aVal ? 1 : 0;
          bVal = bVal ? 1 : 0;
        }
        
        if (typeof aVal === 'string') aVal = aVal.toLowerCase();
        if (typeof bVal === 'string') bVal = bVal.toLowerCase();
        
        if (aVal < bVal) return currentSort.desc ? 1 : -1;
        if (aVal > bVal) return currentSort.desc ? -1 : 1;
        return 0;
      });
      
      // Render table
      const tbody = document.getElementById('leads-table');
      tbody.innerHTML = filtered.map((lead, i) => {
        const score = parseInt(lead.leadScore) || 0;
        const scoreClass = score >= 40 ? 'high' : score >= 20 ? 'medium' : 'low';
        const statusClass = (lead.status || 'to-contact').replace(' ', '-');
        
        return `
          <tr data-index="${leads.indexOf(lead)}">
            <td>
              <span class="lead-name">${escapeHtml(lead.name || 'Unknown')}</span>
              <a class="lead-url" href="${escapeHtml(lead.url || '#')}" target="_blank">${escapeHtml(lead.url || '')}</a>
            </td>
            <td><span class="score ${scoreClass}">${score}</span></td>
            <td>
              <input type="checkbox" ${lead.inDrafts ? 'checked' : ''} 
                     onchange="toggleDraft(${leads.indexOf(lead)}, this.checked)"
                     title="In Gmail Drafts">
              ${lead.inDrafts ? '<span class="draft-badge">Draft</span>' : ''}
            </td>
            <td>
              <select class="status-select ${statusClass}" onchange="updateStatus(${leads.indexOf(lead)}, this.value)">
                <option value="to-contact" ${lead.status === 'to-contact' ? 'selected' : ''}>To Contact</option>
                <option value="contacted" ${lead.status === 'contacted' ? 'selected' : ''}>Contacted</option>
                <option value="responded" ${lead.status === 'responded' ? 'selected' : ''}>Responded</option>
                <option value="client" ${lead.status === 'client' ? 'selected' : ''}>Client</option>
                <option value="not-interested" ${lead.status === 'not-interested' ? 'selected' : ''}>Not Interested</option>
              </select>
            </td>
            <td class="contact-info">
              ${lead.email ? `<a href="mailto:${escapeHtml(lead.email)}">${escapeHtml(lead.email)}</a><br>` : ''}
              ${lead.instagram ? `<a href="${escapeHtml(lead.instagram)}" target="_blank">Instagram</a><br>` : ''}
              ${lead.phone ? `${escapeHtml(lead.phone)}` : ''}
            </td>
            <td class="issues">${escapeHtml(lead.issues || '-')}</td>
            <td>
              <input type="text" class="notes-input" value="${escapeHtml(lead.notes || '')}" 
                     onchange="updateNotes(${leads.indexOf(lead)}, this.value)" 
                     placeholder="Add notes...">
            </td>
            <td class="actions">
              ${lead.email ? `<button class="action-btn" onclick="openGmail(${leads.indexOf(lead)})">✉️</button>` : ''}
              <button class="action-btn" onclick="copyEmail(${leads.indexOf(lead)})">📋</button>
            </td>
          </tr>
        `;
      }).join('');
      
      // Update stats
      document.getElementById('total-count').textContent = leads.length;
      document.getElementById('contacted-count').textContent = leads.filter(l => l.status === 'contacted').length;
      document.getElementById('responded-count').textContent = leads.filter(l => l.status === 'responded').length;
      document.getElementById('client-count').textContent = leads.filter(l => l.status === 'client').length;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    
    function updateStatus(index, value) {
      leads[index].status = value;
      saveData();
      render();
    }
    
    function updateNotes(index, value) {
      leads[index].notes = value;
      saveData();
    }
    
    function toggleDraft(index, checked) {
      leads[index].inDrafts = checked;
      saveData();
      render();
    }
    
    function saveData() {
      localStorage.setItem('kspf-leads', JSON.stringify(leads));
      showSaveIndicator();
    }
    
    function showSaveIndicator() {
      const indicator = document.getElementById('save-indicator');
      indicator.classList.add('show');
      setTimeout(() => indicator.classList.remove('show'), 2000);
    }
    
    function openGmail(index) {
      const lead = leads[index];
      const subject = encodeURIComponent(`Quick thought on ${lead.name}'s website`);
      const body = encodeURIComponent(`Hi there,

I came across ${lead.name} while looking at ${lead.category || 'independent businesses'} in Melbourne and really like what you're doing.

I noticed your website might have ${(lead.issues || 'some areas for improvement').split(';')[0]} — not a criticism, just something I spotted as a web designer.

I run a small design studio (kspf.au) and work with independent Melbourne businesses on exactly this kind of thing. Would you be open to a quick chat about it? No pressure, happy to share some thoughts either way.

Cheers,
Rowan
KSPF Design Studio
kspf.au`);
      
      window.open(`https://mail.google.com/mail/?view=cm&to=${lead.email}&su=${subject}&body=${body}`, '_blank');
    }
    
    function copyEmail(index) {
      const lead = leads[index];
      const email = `Subject: Quick thought on ${lead.name}'s website

Hi there,

I came across ${lead.name} while looking at ${lead.category || 'independent businesses'} in Melbourne and really like what you're doing.

I noticed your website might have ${(lead.issues || 'some areas for improvement').split(';')[0]} — not a criticism, just something I spotted as a web designer.

I run a small design studio (kspf.au) and work with independent Melbourne businesses on exactly this kind of thing. Would you be open to a quick chat about it? No pressure, happy to share some thoughts either way.

Cheers,
Rowan
KSPF Design Studio
kspf.au`;
      
      navigator.clipboard.writeText(email);
      showSaveIndicator();
      document.getElementById('save-indicator').textContent = '✓ Email copied';
      setTimeout(() => {
        document.getElementById('save-indicator').textContent = '✓ Changes saved';
      }, 2000);
    }
    
    function exportData() {
      const data = JSON.stringify(leads, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `kspf-leads-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
    }
  </script>
</body>
</html>
