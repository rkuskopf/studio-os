name: Asana ↔ GitHub Sync

on:
  schedule:
    # Daily at 6 AM AEDT (UTC+11, Australian Eastern Daylight Time) = 7 PM UTC previous day
    # In AEST (UTC+10, winter), this runs at 5 AM — adjust cron to '0 20 * * *' for 6 AM AEST
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      direction:
        description: 'Sync direction'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - asana-to-gh
          - gh-to-asana
          - cross-repo
      project:
        description: 'Asana project name or GID (leave blank for all)'
        required: false
        default: ''
      target_project:
        description: 'Target Asana project for GitHub→Asana sync (default: Engine)'
        required: false
        default: 'Engine'
      subtasks:
        description: 'Include Asana subtasks in sync'
        required: false
        default: false
        type: boolean
      label_routing:
        description: 'Label routing JSON (e.g., {"engine":"Engine","ops":"Operations"})'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (preview only, no changes)'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup GitHub CLI auth
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Build sync arguments
        id: args
        run: |
          ARGS=""
          DIRECTION="${{ inputs.direction || 'both' }}"
          PROJECT="${{ inputs.project }}"
          TARGET_PROJECT="${{ inputs.target_project || 'Engine' }}"
          SUBTASKS="${{ inputs.subtasks }}"
          DRY_RUN="${{ inputs.dry_run }}"

          if [ "$DRY_RUN" != "true" ]; then
            ARGS="$ARGS --sync"
          fi

          ARGS="$ARGS --direction $DIRECTION"

          if [ -n "$PROJECT" ]; then
            ARGS="$ARGS --project \"$PROJECT\""
          fi

          if [ -n "$TARGET_PROJECT" ]; then
            ARGS="$ARGS --target-project \"$TARGET_PROJECT\""
          fi

          if [ "$SUBTASKS" == "true" ]; then
            ARGS="$ARGS --subtasks"
          fi

          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

      - name: Run Asana ↔ GitHub sync
        working-directory: tools/sync
        env:
          ASANA_PAT: ${{ secrets.ASANA_PAT }}
          GITHUB_REPO: rkuskopf/studio-os
          LABEL_ROUTING: ${{ inputs.label_routing }}
        run: node sync-asana-github.js ${{ steps.args.outputs.args }}

      - name: Update TASKS.md from GitHub issue state
        if: ${{ steps.args.outputs.dry_run != 'true' }}
        working-directory: tools/sync
        run: node sync-github-to-tasks.js --sync --repo rkuskopf/studio-os

      - name: Commit TASKS.md changes
        if: ${{ steps.args.outputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TASKS.md
          git diff --cached --quiet || git commit -m "chore: sync TASKS.md from GitHub issue state [skip ci]"
          git push
